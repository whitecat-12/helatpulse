<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>HealthPulse — Splash Screen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --primary-gradient: linear-gradient(135deg, #4F46E5, #7C3AED);
            --bg: #F8FAFC;
            --white: #FFFFFF;
            --text: #0F172A;
            --text-secondary: #64748B;
            --shadow-lg: 0 12px 40px rgba(79, 70, 229, 0.18);
            --radius: 20px;
            --radius-sm: 14px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: linear-gradient(160deg, #EEF2FF 0%, #F8FAFC 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .splash-container {
            max-width: 440px;
            width: 100%;
            background: var(--white);
            border-radius: var(--radius);
            padding: 48px 32px 40px 32px;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .splash-container::before {
            content: '';
            position: absolute;
            top: -60%;
            right: -30%;
            width: 300px;
            height: 300px;
            background: var(--primary-gradient);
            opacity: 0.04;
            border-radius: 50%;
            pointer-events: none;
        }

        .splash-container::after {
            content: '';
            position: absolute;
            bottom: -40%;
            left: -20%;
            width: 250px;
            height: 250px;
            background: var(--primary-gradient);
            opacity: 0.03;
            border-radius: 50%;
            pointer-events: none;
        }

        .splash-logo {
            margin-bottom: 32px;
            position: relative;
            z-index: 1;
        }

        .splash-logo .logo-icon {
            width: 80px;
            height: 80px;
            background: var(--primary-gradient);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            box-shadow: 0 8px 30px rgba(79, 70, 229, 0.25);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .splash-logo .logo-icon i {
            font-size: 36px;
            color: white;
        }

        .splash-logo h1 {
            font-size: 28px;
            font-weight: 900;
            color: var(--text);
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .splash-logo h1 span {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .splash-logo p {
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
        }

        .splash-content {
            position: relative;
            z-index: 1;
        }

        .splash-content .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
            padding: 0 8px;
        }

        .splash-content .subtitle i {
            color: var(--primary);
        }

        .whatsapp-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 40px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.30);
            text-decoration: none;
            width: 100%;
            max-width: 320px;
        }

        .whatsapp-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(37, 211, 102, 0.40);
        }

        .whatsapp-button:active {
            transform: scale(0.97);
        }

        .whatsapp-button i {
            font-size: 24px;
        }

        .whatsapp-button .button-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1.2;
        }

        .whatsapp-button .button-text .main-text {
            font-size: 16px;
            font-weight: 700;
        }

        .whatsapp-button .button-text .sub-text {
            font-size: 11px;
            font-weight: 400;
            opacity: 0.85;
        }

        .splash-footer {
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid #E2E8F0;
            position: relative;
            z-index: 1;
        }

        .splash-footer p {
            font-size: 12px;
            color: var(--text-light);
            font-weight: 500;
        }

        .splash-footer p i {
            color: #EF4444;
            margin: 0 4px;
        }

        /* Status konfirmasi */
        .confirmation-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ECFDF5;
            color: #065F46;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .confirmation-badge i {
            color: #10B981;
        }

        /* Animasi loading splash */
        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .loading-dots span {
            width: 10px;
            height: 10px;
            background: var(--primary-gradient);
            border-radius: 50%;
            animation: dotBounce 1.4s ease-in-out infinite both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        .loading-dots span:nth-child(3) { animation-delay: 0s; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0.4); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Responsif */
        @media (max-width: 480px) {
            .splash-container {
                padding: 32px 20px 28px 20px;
                border-radius: 16px;
            }

            .splash-logo .logo-icon {
                width: 64px;
                height: 64px;
            }

            .splash-logo .logo-icon i {
                font-size: 28px;
            }

            .splash-logo h1 {
                font-size: 24px;
            }

            .whatsapp-button {
                padding: 14px 24px;
                font-size: 14px;
                max-width: 100%;
            }

            .whatsapp-button i {
                font-size: 20px;
            }

            .whatsapp-button .button-text .main-text {
                font-size: 14px;
            }
        }

        @media (max-width: 360px) {
            .splash-container {
                padding: 24px 16px 20px 16px;
            }

            .splash-logo .logo-icon {
                width: 56px;
                height: 56px;
            }

            .splash-logo .logo-icon i {
                font-size: 24px;
            }

            .splash-logo h1 {
                font-size: 20px;
            }

            .splash-logo p {
                font-size: 13px;
            }

            .whatsapp-button {
                padding: 12px 16px;
                font-size: 13px;
                gap: 8px;
            }

            .whatsapp-button i {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

<div class="splash-container">
    <!-- Logo -->
    <div class="splash-logo">
        <div class="logo-icon">
            <i class="fas fa-heartbeat"></i>
        </div>
        <h1>Health<span>Pulse</span></h1>
        <p>Jaga kesehatanmu, pantau setiap hari</p>
    </div>

    <div class="splash-content">
        <!-- Loading animation -->
        <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- Badge konfirmasi -->
        <div class="confirmation-badge">
            <i class="fas fa-check-circle"></i>
            Menunggu Konfirmasi Pihak Terkait
        </div>

        <p class="subtitle">
            <i class="fas fa-info-circle"></i> 
            Untuk melanjutkan, silakan konfirmasi ke pihak yang bersangkutan melalui WhatsApp
        </p>

        <!-- Tombol WhatsApp -->
        <a href="https://wa.me/6285624250896?text=Halo%20saya%20ingin%20konfirmasi%20terkait%20HealthPulse" 
           target="_blank" 
           class="whatsapp-button">
            <i class="fab fa-whatsapp"></i>
            <span class="button-text">
                <span class="main-text">Konfirmasi via WhatsApp</span>
                <span class="sub-text">+62 856-2425-0896</span>
            </span>
        </a>
    </div>

    <div class="splash-footer">
        <p>
            <i class="fas fa-heart"></i> HealthPulse — Tunggu konfirmasi dari pihak terkait
        </p>
    </div>
</div>

<!-- Script sederhana untuk efek -->
<script>
    // Saat halaman dimuat, efek loading dots berjalan otomatis
    document.addEventListener('DOMContentLoaded', function() {
        // Efek tambahan: badge berkedip pelan
        const badge = document.querySelector('.confirmation-badge');
        if (badge) {
            setInterval(() => {
                badge.style.opacity = badge.style.opacity === '0.6' ? '1' : '0.6';
            }, 1500);
        }

        // Log untuk developer
        console.log('HealthPulse Splash Screen - Menunggu konfirmasi');
        console.log('Nomor WhatsApp: +62 856-2425-0896');
    });

    // Fungsi untuk tracking klik tombol (opsional)
    document.querySelector('.whatsapp-button')?.addEventListener('click', function() {
        console.log('Tombol WhatsApp diklik - Konfirmasi ke +62 856-2425-0896');
    });
</script>

</body>
</html>
